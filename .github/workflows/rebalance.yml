name: TQQQ/SGOV rebalance

# ─── 觸發時機 ─────────────────────────────────────────
on:
  schedule:
    # ⚠️ GitHub cron 用 UTC。下面是美國「夏令時間 (EDT, UTC-4)」對應的時刻。
    #
    # 為什麼每個時段排 2 次：
    #   GH Actions cron 是 best-effort（可能延遲幾分鐘到幾小時）。
    #   每個目標時段排「主 + 備援」兩個 cron，相隔 ~8 分鐘。
    #   bot 內建的「未成交單檢查」會自動讓備援不會下重複單：
    #     - 主成功 → 備援跑時看到剛下的單還沒成交 → 跳過整輪
    #     - 主被 GH 吃掉 → 備援補上
    #   時間也刻意避開整點（GH 文件說整點最容易塞車）。
    #
    # DST 轉換時要手動改：
    #   3 月第二個週日 → EDT 開始（夏令）：用下面的設定
    #   11 月第一個週日 → EST 開始（冬令）：把每個 cron 的小時欄位 +1
    #
    # cron 格式：minute hour day month day_of_week （day_of_week 1=Mon, 5=Fri）
    - cron: '34 13 * * 1-5'   # 9:34 ET — 開盤掃（主）
    - cron: '42 13 * * 1-5'   # 9:42 ET — 開盤掃（備援）
    - cron: '17 16 * * 1-5'   # 12:17 ET — 盤中掃（主）
    - cron: '25 16 * * 1-5'   # 12:25 ET — 盤中掃（備援）
    - cron: '53 19 * * 1-5'   # 15:53 ET — 收盤前掃（主）
    - cron: '57 19 * * 1-5'   # 15:57 ET — 收盤前掃（備援）

  # 允許從 GitHub UI 手動觸發（測試用、臨時補跑用）
  workflow_dispatch:

# 防止重疊執行：上一輪還在跑時，新觸發的會排隊等
# 不是 cancel-in-progress：執行到一半被砍可能下了一半單就掛了
concurrency:
  group: rebalance
  cancel-in-progress: false

# Workflow 預設的 GITHUB_TOKEN 權限
# issues: write → 需要才能對「Bot status」issue 留言
# contents: read → checkout 用
permissions:
  issues: write
  contents: read

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # 正常 < 30s，超過 5 分鐘表示卡住

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        # v8 起官方不再發浮動的 @v8 major tag，必須用完整版號
        # 升級時：到 https://github.com/astral-sh/setup-uv/releases 取最新版號
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen  # --frozen: 一定用 uv.lock 鎖定的版本

      # ── 注入 OAuth token ──
      # 把 secret 裡的 base64 字串解碼成 .token.json
      # base64 避免多行 JSON 的 shell quoting 問題
      - name: Restore .token.json from secret
        env:
          TOKEN_B64: ${{ secrets.RH_TOKEN_JSON_B64 }}
        run: |
          if [ -z "$TOKEN_B64" ]; then
            echo "::error::Secret RH_TOKEN_JSON_B64 is not set. 看 README 的 Phase 3b 設定章節。"
            exit 1
          fi
          echo "$TOKEN_B64" | base64 -d > .token.json
          chmod 600 .token.json

      # ── 真的執行 ──
      # --execute 才會送單；main_bot.py 內建：
      #   - 開放單檢查（重複下單防護）
      #   - review 警示阻擋
      #   - smoke-review 跟 execute 互斥
      # 把 stdout 同時印到 log 跟存檔（pipefail 確保 bot 失敗時 step 也算失敗）
      - name: Run rebalance
        env:
          RH_AGENTIC_ACCOUNT: ${{ secrets.RH_AGENTIC_ACCOUNT }}
        run: |
          if [ -z "$RH_AGENTIC_ACCOUNT" ]; then
            echo "::error::Secret RH_AGENTIC_ACCOUNT is not set."
            exit 1
          fi
          set -o pipefail
          uv run main_bot.py --execute 2>&1 | tee bot_output.log

      # ── 把結果寫進公開 issue ──
      # if: always() → 不論前面 step 成功或失敗都跑（要在失敗時也留紀錄）
      # 注意：issue 是公開的，所以只貼「不帶金額/單號」的最小摘要
      # 完整 log 留在 Actions tab 內，私人可見
      - name: Post status to issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e  # 這個 step 自己壞了不要傳染失敗狀態

          # 從 log 抽取「能公開的最小資訊」
          # action：bot 高層動作（hold / rebalance / idle / skipped-open-orders / unknown）
          # 注意：render() 輸出格式是「Action:<多個空格>值」，所以用 awk 抽第二欄
          ACTION="unknown"
          if [ -f bot_output.log ]; then
            if grep -q "Skipping this cycle" bot_output.log; then
              ACTION="skipped-open-orders"
            else
              VAL=$(grep "^Action:" bot_output.log | head -1 | awk '{print $2}')
              if [ -n "$VAL" ]; then
                ACTION="$VAL"
              fi
            fi
          fi
          # placed：實際下了幾張單（grep PLACED 行數）
          if [ -f bot_output.log ]; then
            PLACED=$(grep -c ">>> PLACED" bot_output.log || true)
          else
            PLACED=0
          fi

          NOW_UTC=$(date -u +"%Y-%m-%d %H:%M UTC")
          NOW_ET=$(TZ=America/New_York date +"%H:%M ET")
          STATUS="${{ job.status }}"

          # 細化 trigger 字串：對 schedule event 加上「是哪條 cron」和「延遲多少」
          # GH 給的 github.event.schedule 是觸發的 cron 表達式，例如 "35 13 * * 1-5"
          # 用第 1、2 欄（分、時）當「預定時間」，跟現在 UTC 比較算 delay
          EV="${{ github.event_name }}"
          SCHED="${{ github.event.schedule }}"
          if [ "$EV" = "schedule" ] && [ -n "$SCHED" ]; then
            S_MIN=$(echo "$SCHED" | awk '{print $1}')
            S_HR=$(echo "$SCHED" | awk '{print $2}')
            # 10# 強制十進位（避免 08 被當八進位）
            A_HR=$((10#$(date -u +%H)))
            A_MIN_INHR=$((10#$(date -u +%M)))
            SCHED_MOD=$((S_HR * 60 + S_MIN))
            ACTUAL_MOD=$((A_HR * 60 + A_MIN_INHR))
            DELAY=$((ACTUAL_MOD - SCHED_MOD))
            if [ "$DELAY" -ge 0 ]; then
              DELAY_STR="+${DELAY}m"
            else
              DELAY_STR="${DELAY}m"
            fi
            TRIGGER=$(printf 'schedule@%02d:%02d (%s)' "$S_HR" "$S_MIN" "$DELAY_STR")
          else
            TRIGGER="$EV"
          fi

          # 找有沒有現存的「Bot status」issue（標題完全相符、open 狀態）
          ISSUE_NUM=$(gh issue list --search 'in:title "Bot status"' --state open \
                      --json number,title \
                      --jq '[.[] | select(.title == "Bot status")] | first.number // empty')

          # 沒有就建一個
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(gh issue create \
              --title "Bot status" \
              --body $'Automated status updates from `.github/workflows/rebalance.yml`. Each comment = one workflow run.\n\n- **run**: workflow status (success/failure)\n- **action**: bot decision (hold / rebalance / idle / skipped-open-orders / unknown)\n- **placed**: number of orders actually sent to broker\n\n訂閱這個 issue 就會每次跑都收到通知。\n完整 log 看 [Actions tab](../../actions)（不公開）。' \
              | grep -oE '[0-9]+$')
          fi

          gh issue comment "$ISSUE_NUM" --body \
            "**$NOW_UTC** ($NOW_ET) • run: \`$STATUS\` • action: \`$ACTION\` • placed: \`$PLACED\` • trigger: \`$TRIGGER\`"
